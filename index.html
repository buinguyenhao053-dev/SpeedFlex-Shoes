<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HAO SHOES - Trang Chủ</title>

    <link rel="stylesheet" href="../css/bootstrap.min.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="../css/style.css" />
    <script src="../js/jquery-4.0.0.min.js"></script>
  </head>

  <body>
    <div id="shared-header"></div>
    <script>
      fetch("../compones/header.html")
        .then((res) => res.text())
        .then((html) => {
          const host = document.getElementById("shared-header");
          host.innerHTML = html;

          host.querySelectorAll("script").forEach((oldScript) => {
            const newScript = document.createElement("script");
            if (oldScript.src) {
              newScript.src = oldScript.src;
            } else {
              newScript.textContent = oldScript.textContent;
            }
            document.body.appendChild(newScript);
            oldScript.remove();
          });
        });
    </script>

    <section class="hero">
      <div class="hero-content">
        <h1>GIÀY HOT 2026</h1>
        <p>Phong cách hiện đại - Giá cực tốt</p>
        <a href="sale.html" class="my-btn">Mua ngay</a>
      </div>
    </section>

    <section class="section">
      <h2>Giày Nam Nổi Bật</h2>
      <div class="products" id="menFeatured"></div>
    </section>

    <section class="section">
      <h2>Giày Nữ Nổi Bật</h2>
      <div class="products" id="womenFeatured"></div>
    </section>

    <div id="shared-footer"></div>
    <script>
      fetch("../compones/footer.html")
        .then((res) => res.text())
        .then((html) => {
          const host = document.getElementById("shared-footer");
          host.innerHTML = html;

          host.querySelectorAll("script").forEach((oldScript) => {
            const newScript = document.createElement("script");
            if (oldScript.src) newScript.src = oldScript.src;
            else newScript.textContent = oldScript.textContent;
            document.body.appendChild(newScript);
            oldScript.remove();
          });
        });
    </script>
    <script>
      $(document).ready(function () {
        // Kiểm tra trạng thái đăng nhập
        let isLogin = localStorage.getItem("isLogin");
        let currentUser = JSON.parse(localStorage.getItem("currentUser"));

        if (isLogin === "true" && currentUser) {
          $("#auth-links").html(`
                    <span class="text-success me-2">Chào, ${currentUser.hoten}</span>
                    <a href="#" id="btnLogout">Đăng xuất</a>
                `);
        }

        // Xử lý đăng xuất
        $(document).on("click", "#btnLogout", function (e) {
          e.preventDefault();
          localStorage.removeItem("isLogin");
          localStorage.removeItem("currentUser");
          alert("Đã đăng xuất!");
          location.reload();
        });
      });
    </script>
    <script type="module">
      import { menProducts, womenProducts } from "./js/products.js";

      function formatCurrency(value) {
        return value.toLocaleString("vi-VN") + "₫";
      }

      function renderFeaturedProducts(containerId, products, source) {
        const container = document.getElementById(containerId);
        if (!container) return;

        container.innerHTML = products
          .slice(0, 4)
          .map(
            (product) => `
                    <div class="card">
                        <img src="${product.image}" alt="${product.name}">
                        <h3>${product.name}</h3>
                        <p>${formatCurrency(product.price)}</p>
                        <a href="./html/detail.html?id=${product.id}&source=${source}" class="my-btn">Xem chi tiết</a>
                    </div>
                `,
          )
          .join("");
      }

      renderFeaturedProducts("menFeatured", menProducts, "men");
      renderFeaturedProducts("womenFeatured", womenProducts, "women");
    </script>
  </body>
</html>
