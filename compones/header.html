<style>
  @font-face {
    font-family: "Material Symbols Outlined";
    font-style: normal;
    font-weight: 400;
    src:
      url("../assets/MaterialSymbolsOutlined.woff2") format("woff2"),
      url("./assets/MaterialSymbolsOutlined.woff2") format("woff2");
  }

  .material-symbols-outlined {
    font-family: "Material Symbols Outlined";
    font-weight: normal;
    font-style: normal;
    font-size: 22px;
    line-height: 1;
    letter-spacing: normal;
    text-transform: none;
    display: inline-block;
    white-space: nowrap;
    word-wrap: normal;
    direction: ltr;
    -webkit-font-feature-settings: "liga";
    font-feature-settings: "liga";
    -webkit-font-smoothing: antialiased;
    user-select: none;
  }

  .hs-topbar {
    background: linear-gradient(90deg, #141414, #2b2b2b);
    color: #f8f8f8;
    font-size: 12px;
    letter-spacing: 0.3px;
    padding: 9px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .hs-header {
    position: sticky;
    top: 0;
    z-index: 1000;
    background: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(14px);
    border-bottom: 1px solid rgba(17, 17, 17, 0.06);
    box-shadow: 0 10px 28px rgba(17, 17, 17, 0.08);
    padding: 14px 28px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 20px;
    align-items: center;
  }

  .hs-logo {
    font-size: 24px;
    font-weight: 900;
    color: #111;
    text-decoration: none;
    letter-spacing: 1px;
    position: relative;
  }

  .hs-logo::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: -4px;
    width: 42px;
    height: 3px;
    border-radius: 999px;
    background: linear-gradient(90deg, #111, #6a6a6a);
  }

  .hs-nav {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .hs-link {
    color: #333;
    text-decoration: none;
    font-weight: 700;
    font-size: 14px;
    padding: 9px 12px;
    border-radius: 10px;
    position: relative;
    transition: 0.22s ease;
  }

  .hs-link:hover {
    background: #f5f1eb;
    color: #111;
  }

  .hs-link::after {
    content: "";
    position: absolute;
    left: 12px;
    right: 12px;
    bottom: 5px;
    height: 2px;
    border-radius: 999px;
    background: #111;
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.2s ease;
  }

  .hs-link:hover::after,
  .hs-link.active::after {
    transform: scaleX(1);
  }

  .hs-link.active {
    background: #111;
    color: #fff;
    box-shadow: 0 8px 16px rgba(17, 17, 17, 0.2);
  }

  .hs-search {
    margin-left: auto;
    min-width: 250px;
    display: flex;
    align-items: center;
    gap: 8px;
    background: #fbf8f3;
    border-radius: 999px;
    border: 1px solid #e7decf;
    padding: 8px 14px;
    transition:
      border-color 0.2s ease,
      box-shadow 0.2s ease;
  }

  .hs-search input {
    border: none;
    outline: none;
    background: transparent;
    width: 100%;
    font-size: 14px;
  }
  .hs-search:focus-within {
    border-color: #b5a792;
    box-shadow: 0 0 0 4px rgba(181, 167, 146, 0.18);
  }

  .hs-actions {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .hs-icon-btn {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    border: 1px solid #ddcfba;
    background: linear-gradient(180deg, #ffffff, #f7f2e9);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    color: #111;
    font-size: 18px;
    box-shadow: 0 6px 14px rgba(17, 17, 17, 0.08);
    transition:
      transform 0.2s ease,
      box-shadow 0.2s ease;
  }

  .hs-icon-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(17, 17, 17, 0.14);
  }

  .hs-user-menu {
    position: relative;
  }

  .hs-user-menu::after {
    content: "";
    position: absolute;
    top: 100%;
    right: 0;
    width: 180px;
    height: 10px;
  }

  .hs-user-dropdown {
    position: absolute;
    top: calc(100% + 8px);
    right: 0;
    min-width: 140px;
    background: #fff;
    border: 1px solid #e5d8c5;
    border-radius: 12px;
    box-shadow: 0 14px 28px rgba(17, 17, 17, 0.14);
    padding: 8px;
    display: none;
    z-index: 10;
  }

  .hs-user-dropdown a {
    display: block;
    text-decoration: none;
    color: #222;
    border-radius: 8px;
    padding: 8px 10px;
    font-weight: 600;
    font-size: 14px;
  }

  .hs-user-dropdown a:hover {
    background: #f5f0e8;
  }

  .hs-user-menu:hover .hs-user-dropdown {
    display: block;
  }

  @media (max-width: 992px) {
    .hs-header {
      grid-template-columns: 1fr;
      padding: 12px 16px;
      gap: 12px;
    }

    .hs-nav {
      gap: 8px;
    }

    .hs-search {
      margin-left: 0;
      width: 100%;
      min-width: 0;
      order: 3;
    }

    .hs-actions {
      justify-content: flex-end;
    }
  }
</style>

<div class="hs-topbar">
  <div>Miễn phí vận chuyển toàn quốc</div>
</div>

<header class="hs-header">
  <a id="hs-home-link" class="hs-logo" href="#">HAO SHOES</a>

  <nav class="hs-nav">
    <a id="hs-nav-home" class="hs-link" href="#">Trang chủ</a>
    <a id="hs-nav-about" class="hs-link" href="#">Thương hiệu</a>
    <a id="hs-nav-men" class="hs-link" href="#">Nam</a>
    <a id="hs-nav-women" class="hs-link" href="#">Nữ</a>
    <a id="hs-nav-sale" class="hs-link" href="#">Đang Sale</a>
    <label class="hs-search">
      <span>🔎</span>
      <input type="text" placeholder="Tìm kiếm nhanh..." />
    </label>
  </nav>

  <div class="hs-actions">
    <a id="hs-cart-link" class="hs-icon-btn" href="#" aria-label="Giỏ hàng">
      <span class="material-symbols-outlined">shopping_bag</span>
    </a>
    <div class="hs-user-menu">
      <button class="hs-icon-btn" type="button" aria-label="Tài khoản">
        <span class="material-symbols-outlined">person</span>
      </button>
      <div class="hs-user-dropdown" id="user-dropdown"></div>
    </div>
  </div>
</header>

<script>
  (function () {
    const inHtmlFolder = window.location.pathname.includes("/html/");
    const links = inHtmlFolder
      ? {
          home: "../index.html",
          about: "about.html",
          men: "men.html",
          women: "women.html",
          sale: "sale.html",
          cart: "cart.html",
          login: "login.html",
          register: "register.html",
        }
      : {
          home: "index.html",
          about: "html/about.html",
          men: "html/men.html",
          women: "html/women.html",
          sale: "html/sale.html",
          cart: "html/cart.html",
          login: "html/login.html",
          register: "html/register.html",
        };

    // ===== LINK =====
    document.getElementById("hs-home-link").href = links.home;
    document.getElementById("hs-nav-home").href = links.home;
    document.getElementById("hs-nav-about").href = links.about;
    document.getElementById("hs-nav-men").href = links.men;
    document.getElementById("hs-nav-women").href = links.women;
    document.getElementById("hs-nav-sale").href = links.sale;
    document.getElementById("hs-cart-link").href = links.cart;

    // ===== ACTIVE =====
    const path = window.location.pathname.toLowerCase();
    const activeMap = [
      { key: "hs-nav-home", match: "/index.html" },
      { key: "hs-nav-about", match: "/about.html" },
      { key: "hs-nav-men", match: "/men.html" },
      { key: "hs-nav-women", match: "/women.html" },
      { key: "hs-nav-sale", match: "/sale.html" },
    ];

    activeMap.forEach((item) => {
      if (path.endsWith(item.match)) {
        document.getElementById(item.key).classList.add("active");
      }
    });

    // ===== AUTH UI =====
    function updateAuthUI() {
      const dropdown = document.getElementById("user-dropdown");
      if (!dropdown) return;

      const user = JSON.parse(localStorage.getItem("currentUser"));

      if (user) {
        dropdown.innerHTML = `
        <div style="padding:8px 10px;font-size:13px;color:#666;">
          Chào, ${user.hoten || user.email}
        </div>
        <a href="#" id="logout-btn">Đăng xuất</a>
      `;

        document.getElementById("logout-btn").onclick = function (e) {
          e.preventDefault();
          localStorage.removeItem("currentUser");
          location.reload();
        };
      } else {
        dropdown.innerHTML = `
        <a href="${links.login}">Đăng nhập</a>
        <a href="${links.register}">Đăng ký</a>
      `;
      }
    }

    // 🔥 chạy sau khi render
    setTimeout(updateAuthUI, 200);
  })();
</script>
