<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAO SHOES - Quên mật khẩu</title>
    <script src="../js/jquery-4.0.0.min.js"></script>
    <link rel="stylesheet" href="../css/bootstrap.min.css">
    <link rel="stylesheet" href="../css/style.css">

    <style>
        .section-forgot {
            min-height: 80vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }

        .forgot-card {
            width: 500px;
            max-width: 95%;
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            animation: fadeUp 0.5s ease;
        }

        .forgot-card input {
            height: 45px;
        }

        .btn-send {
            height: 45px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-send:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        /* RESULT BOX */
        .result-box {
            background: #f5f5f5;
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
        }

        /* TOAST */
        .toast-msg {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #111;
            color: white;
            padding: 12px 18px;
            border-radius: 8px;
            opacity: 0;
            transform: translateY(-20px);
            transition: 0.3s;
            z-index: 9999;
        }

        .toast-msg.show {
            opacity: 1;
            transform: translateY(0);
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>

</head>

</body>

</html>
