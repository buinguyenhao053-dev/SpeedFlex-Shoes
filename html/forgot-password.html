<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quên mật khẩu</title>
    <script src="../js/jquery-4.0.0.min.js"></script>
    <link rel="stylesheet" href="../css/bootstrap.min.css" />
    <link rel="stylesheet" href="../css/style.css" />

    <style>
      .section-forgot {
        min-height: 80vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 30px;
      }

      .forgot-card {
        width: 500px;
        max-width: 95%;
        background: white;
        border-radius: 15px;
        padding: 40px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        animation: fadeUp 0.5s ease;
      }

      .forgot-card input {
        height: 45px;
      }

      .btn-send {
        height: 45px;
        font-weight: bold;
        transition: 0.3s;
      }

      .btn-send:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
      }

      /* RESULT BOX */
      .result-box {
        background: #f5f5f5;
        padding: 12px;
        border-radius: 8px;
        margin-top: 15px;
        display: none;
      }

      /* TOAST */
      .toast-msg {
        position: fixed;
        top: 20px;
        right: 20px;
        background: #111;
        color: white;
        padding: 12px 18px;
        border-radius: 8px;
        opacity: 0;
        transform: translateY(-20px);
        transition: 0.3s;
        z-index: 9999;
      }

      .toast-msg.show {
        opacity: 1;
        transform: translateY(0);
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>

  <body>
    <div id="shared-header"></div>
    <div id="toast" class="toast-msg"></div>
    <script>
      fetch("../compones/header.html")
        .then((res) => res.text())
        .then((html) => {
          const host = document.getElementById("shared-header");
          host.innerHTML = html;

          host.querySelectorAll("script").forEach((oldScript) => {
            const newScript = document.createElement("script");
            if (oldScript.src) {
              newScript.src = oldScript.src;
            } else {
              newScript.textContent = oldScript.textContent;
            }
            document.body.appendChild(newScript);
            oldScript.remove();
          });
        });
    </script>

    <section class="section-forgot">
      <div class="forgot-card">
        <h3 class="text-center fw-bold mb-3">Quên mật khẩu</h3>

        <p class="text-muted text-center mb-4">
          Nhập email đã đăng ký để lấy lại mật khẩu
        </p>

        <input
          id="mailsdt"
          class="form-control mb-3"
          placeholder="Nhập email/Số điện thoại"
        />

        <button id="buttonQMK" class="btn btn-dark w-100 btn-send">
          Gửi yêu cầu
        </button>

        <!-- RESULT -->
        <div id="result" class="result-box"></div>

        <div class="text-center mt-3">
          <a href="login.html" style="text-decoration: none"
            >← Quay lại đăng nhập</a
          >
        </div>
      </div>
    </section>
    <script>
$(document).ready(function () {

    $("#buttonQMK").click(function (e) {
        e.preventDefault();

        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        const phoneRegex = /^(0[3|5|7|8|9])[0-9]{8}$/;

        let input = $("#mailsdt").val().trim();
        let users = JSON.parse(localStorage.getItem("users")) || [];

        // validate rỗng
        if (input === "") {
            showResult("❌ Vui lòng nhập email hoặc SĐT");
            return;
        }

        // validate format
        if (!emailRegex.test(input) && !phoneRegex.test(input)) {
            showResult("❌ Email hoặc SĐT không hợp lệ");
            return;
        }

        // tìm user
        let found = users.find(u => u.email === input || u.phone === input);

        if (!found) {
            showResult("❌ Tài khoản không tồn tại!");
        } else {
            showResult("✔ Tìm thấy tài khoản. Bạn có thể đặt lại mật khẩu.");
            
            // giả lập reset (vì không có server)
            setTimeout(() => {
                let newPass = prompt("Nhập mật khẩu mới:");

                if (newPass && newPass.length >= 6) {
                    found.password = newPass;
                    localStorage.setItem("users", JSON.stringify(users));
                    showToast("✔ Đổi mật khẩu thành công!");
                } else {
                    showToast("❌ Mật khẩu tối thiểu 6 ký tự");
                }
            }, 500);
        }
    });

    function showResult(msg) {
        $("#result").show().html(msg);
    }

    function showToast(msg) {
        let toast = $("#toast");
        toast.text(msg).addClass("show");

        setTimeout(() => {
            toast.removeClass("show");
        }, 2000);
    }

});
</script>
  </body>
</html>
