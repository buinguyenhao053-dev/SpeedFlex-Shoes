<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAO SHOES - Quên mật khẩu</title>

<link rel="stylesheet" href="../css/bootstrap.min.css">
<link rel="stylesheet" href="../css/style.css">

<style>

.section-forgot{
    min-height:80vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
}

.forgot-card{
    width:500px;
    max-width:95%;
    background:white;
    border-radius:15px;
    padding:40px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
    animation:fadeUp 0.5s ease;
}

.forgot-card input{
    height:45px;
}

.btn-send{
    height:45px;
    font-weight:bold;
    transition:0.3s;
}

.btn-send:hover{
    transform:translateY(-2px);
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

/* RESULT BOX */
.result-box{
    background:#f5f5f5;
    padding:12px;
    border-radius:8px;
    margin-top:15px;
    display:none;
}

/* TOAST */
.toast-msg{
    position:fixed;
    top:20px;
    right:20px;
    background:#111;
    color:white;
    padding:12px 18px;
    border-radius:8px;
    opacity:0;
    transform:translateY(-20px);
    transition:0.3s;
    z-index:9999;
}

.toast-msg.show{
    opacity:1;
    transform:translateY(0);
}

@keyframes fadeUp{
    from{opacity:0; transform:translateY(30px);}
    to{opacity:1; transform:translateY(0);}
}

</style>

</head>

<body>

<div class="topbar">
    <div>Miễn phí vận chuyển toàn quốc</div>
    <div>
        <a href="login.html">Đăng nhập</a>
        <a href="register.html">Đăng ký</a>
    </div>
</div>

<header>
    <a href="index.html" class="logo">HAO SHOES</a>
</header>

<section class="section-forgot">

<div class="forgot-card">

    <h3 class="text-center fw-bold mb-3">Quên mật khẩu</h3>

    <p class="text-muted text-center mb-4">
        Nhập email đã đăng ký để lấy lại mật khẩu
    </p>

    <input id="email" class="form-control mb-3" placeholder="Nhập email">

    <button onclick="sendMail()" class="btn btn-dark w-100 btn-send">
        Gửi yêu cầu
    </button>

    <!-- RESULT -->
    <div id="result" class="result-box"></div>

    <div class="text-center mt-3">
        <a href="login.html">← Quay lại đăng nhập</a>
    </div>

</div>

</section>

<div id="toast" class="toast-msg"></div>

<footer>
    <p class="copy">© 2026 HAO SHOES</p>
</footer>


</body>
</html>
