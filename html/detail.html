<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chi tiết sản phẩm</title>
    <link rel="stylesheet" href="../css/bootstrap.min.css" />
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/detail.css">
  </head>
  <body>
    <div id="shared-header"></div>
  <script>
    fetch("../compones/header.html")
      .then((res) => res.text())
      .then((html) => {
        const host = document.getElementById("shared-header");
        host.innerHTML = html;

        host.querySelectorAll("script").forEach((oldScript) => {
          const newScript = document.createElement("script");
          if (oldScript.src) {
            newScript.src = oldScript.src;
          } else {
            newScript.textContent = oldScript.textContent;
          }
          document.body.appendChild(newScript);
          oldScript.remove();
        });
      });
  </script>
    <main class="container detail-wrap">
      <div class="detail-card">
        <div class="row g-0">
          <div class="col-lg-6">
            <div class="gallery-panel">
              <img id="img" src="" alt="" />
            </div>
          </div>
          <div class="col-lg-6">
            <div class="info-panel">
              <span class="product-tag" id="tag"></span>
              <h1 id="name" class="mt-3 mb-2"></h1>
              <div class="price-line">
                <div class="price-main" id="price"></div>
                <div class="price-old" id="oldPrice"></div>
              </div>
              <div class="meta-row">
                <span id="category"></span>
                <span id="rating"></span>
                <span id="season"></span>
              </div>
              <p id="desc" class="text-secondary mb-3"></p>

              <h6>Chọn size</h6>
              <div id="sizes" class="size-grid"></div>
              <div class="text-danger small mb-2" id="sizeError"></div>

              <div class="qty-row">
                <strong>Số lượng</strong>
                <div class="qty-control">
                  <button type="button" id="decQty">-</button>
                  <input type="number" id="qty" value="1" min="1" />
                  <button type="button" id="incQty">+</button>
                </div>
              </div>

              <div class="cta-row">
                <button class="add-cart-btn" id="addCart">Thêm vào giỏ hàng</button>
                <a class="ghost-link" id="backLink" href="men.html">Quay lại danh mục</a>
              </div>
            </div>
          </div>
        </div>
      </div>

      <section class="section-shell">
        <h4 class="mb-2">Thông tin sản phẩm</h4>
        <p class="mb-0 text-secondary" id="detailDesc"></p>
      </section>

      <section class="section-shell mb-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h4 class="mb-0">Sản phẩm tương tự</h4>
          <a id="viewAllLink" href="men.html">Xem tất cả</a>
        </div>
        <div id="similarGrid" class="similar-grid"></div>
      </section>
    </main>

    <div id="shared-footer"></div>
    <script>
      fetch("../compones/footer.html")
        .then((res) => res.text())
        .then((html) => {
          const host = document.getElementById("shared-footer");
          host.innerHTML = html;

          host.querySelectorAll("script").forEach((oldScript) => {
            const newScript = document.createElement("script");
            if (oldScript.src) newScript.src = oldScript.src;
            else newScript.textContent = oldScript.textContent;
            document.body.appendChild(newScript);
            oldScript.remove();
          });
        });
    </script>

    <div class="toast-note" id="toastNote">Đã thêm vào giỏ hàng</div>

    <script type="module" src="../js/detail.js"></script>
    <script type="module" src="../js/mascot.js"></script>
  </body>
</html>
