<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thanh toán</title>

    <link rel="stylesheet" href="../css/bootstrap.min.css" />
    <script src="../js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="../css/style.css" />
    <script src="../js/jquery-4.0.0.min.js"></script>
  </head>

  <body>
    <div id="shared-header"></div>
    <script>
      fetch("../compones/header.html")
        .then((res) => res.text())
        .then((html) => {
          const host = document.getElementById("shared-header");
          host.innerHTML = html;

          host.querySelectorAll("script").forEach((oldScript) => {
            const newScript = document.createElement("script");
            if (oldScript.src) {
              newScript.src = oldScript.src;
            } else {
              newScript.textContent = oldScript.textContent;
            }
            document.body.appendChild(newScript);
            oldScript.remove();
          });
        });
    </script>

    <div class="container py-5" style="max-width: 1000px">
      <h2 class="text-center mb-4">Thanh toán</h2>

      <div class="row g-4">
        <!-- FORM -->
        <div class="col-md-7">
          <div class="card p-4 shadow-sm">
            <h5>Thông tin khách hàng</h5>

            <input id="name" class="form-control mb-3" placeholder="Họ tên" />
            <input id="phone" class="form-control mb-3" placeholder="SĐT" />
            <input
              id="address"
              class="form-control mb-3"
              placeholder="Địa chỉ"
            />
            <textarea
              id="note"
              class="form-control"
              placeholder="Ghi chú"
            ></textarea>
          </div>
        </div>

        <!-- ORDER -->
        <div class="col-md-5">
          <div class="card p-4 shadow-sm">
            <h5>Đơn hàng</h5>

            <div id="order-list"></div>

            <hr />

            <h5 class="d-flex justify-content-between">
              <span>Tổng</span>
              <span id="total">0₫</span>
            </h5>

            <button
              id="btnCheckout"
              class="btn btn-dark w-100 mt-3"
              onclick="checkout()"
            >
              Xác nhận đặt hàng
            </button>
          </div>
        </div>
      </div>
    </div>

    <div id="shared-footer"></div>
    <script>
      fetch("../compones/footer.html")
        .then((res) => res.text())
        .then((html) => {
          const host = document.getElementById("shared-footer");
          host.innerHTML = html;

          host.querySelectorAll("script").forEach((oldScript) => {
            const newScript = document.createElement("script");
            if (oldScript.src) newScript.src = oldScript.src;
            else newScript.textContent = oldScript.textContent;
            document.body.appendChild(newScript);
            oldScript.remove();
          });
        });
    </script>

    <script>
      if (!localStorage.getItem("currentUser")) {
        alert("Vui lòng đăng nhập để thanh toán.");
        window.location.href = "login.html";
      }
      
      let cart = JSON.parse(localStorage.getItem("cart")) || [];

      function renderOrder() {
        let html = "";
        let total = 0;

        const list = document.getElementById("order-list");
        const totalEl = document.getElementById("total");
        const btn = document.getElementById("btnCheckout");

        if (cart.length === 0) {
          list.innerHTML = "Không có sản phẩm";
          totalEl.innerText = "0₫";
          btn.disabled = true;
          return;
        }

        btn.disabled = false;

        cart.forEach((item) => {
          total += item.price * item.qty;

          html += `
        <div class="d-flex justify-content-between mb-2">
            <span>${item.name} x${item.qty}</span>
            <span>${(item.price * item.qty).toLocaleString()}₫</span>
        </div>
        `;
        });

        list.innerHTML = html;
        totalEl.innerText = total.toLocaleString() + "₫";
      }

      function checkout() {
        let name = document.getElementById("name").value.trim();
        let phone = document.getElementById("phone").value.trim();
        let address = document.getElementById("address").value.trim();

        if (!name || !phone || !address) {
          alert("Nhập đầy đủ thông tin");
          return;
        }

        if (!/^[0-9]{9,11}$/.test(phone)) {
          alert("SĐT không hợp lệ");
          return;
        }

        if (cart.length === 0) {
          alert("Giỏ hàng trống");
          return;
        }

        let orders = JSON.parse(localStorage.getItem("orders")) || [];

        orders.push({
          name,
          phone,
          address,
          note: document.getElementById("note").value,
          items: cart,
          total: cart.reduce((s, i) => s + i.price * i.qty, 0),
          date: new Date().toLocaleString(),
        });

        localStorage.setItem("orders", JSON.stringify(orders));

        alert("Đặt hàng thành công!");

        localStorage.removeItem("cart");
        location.href = "../index.html";
      }

      document.addEventListener("DOMContentLoaded", renderOrder);
    </script>
  </body>
</html>
