<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sale - HAO SHOES</title>
    <link rel="stylesheet" href="../css/bootstrap.min.css" />
    <link rel="stylesheet" href="../css/style.css" />
    <style>
      body { background: linear-gradient(180deg, #fef7f2 0%, #f8ece8 100%); }
      .sale-shell { width: min(1220px, calc(100% - 24px)); margin: 18px auto 28px; }
      .sale-banner { background: linear-gradient(120deg, #8f0c0c, #dc3a2c); color:#fff; border-radius: 24px; padding: 30px; }
      .sale-banner h1 { margin: 0 0 8px; font-size: clamp(30px, 4vw, 50px); }
      .sale-banner p { margin: 0; max-width: 760px; opacity: .92; }
      .sale-grid { margin-top: 16px; display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 14px; }
      .sale-card { background:#fff; border-radius:18px; border:1px solid rgba(17,17,17,.08); overflow:hidden; box-shadow:0 12px 24px rgba(17,17,17,.06); }
      .sale-media { position: relative; background: linear-gradient(180deg,#f7efe8,#efe2d5); padding: 12px; }
      .sale-media img { width:100%; height:200px; object-fit:contain; display:block; }
      .sale-badge { position:absolute; left:12px; top:12px; background:#b31212; color:#fff; padding:6px 10px; border-radius:999px; font-weight:700; font-size:12px; }
      .sale-info { padding: 14px; }
      .sale-info h3 { margin: 0 0 8px; font-size: 18px; }
      .sale-meta { color:#666; font-size:13px; margin-bottom: 8px; }
      .price-wrap { display:flex; gap:8px; align-items: baseline; flex-wrap: wrap; margin-bottom: 10px; }
      .new-price { color:#b31212; font-size:22px; font-weight:800; }
      .old-price { color:#888; text-decoration: line-through; font-size:15px; }
      .sale-card .my-btn { display:inline-block; }
      @media (max-width: 992px) { .sale-grid { grid-template-columns: 1fr 1fr; } }
      @media (max-width: 640px) { .sale-grid { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <div id="shared-header"></div>
    <script>
      fetch("../compones/header.html").then((r) => r.text()).then((html) => {
        const host = document.getElementById("shared-header");
        host.innerHTML = html;
        host.querySelectorAll("script").forEach((oldScript) => {
          const s = document.createElement("script");
          if (oldScript.src) s.src = oldScript.src;
          else s.textContent = oldScript.textContent;
          document.body.appendChild(s);
          oldScript.remove();
        });
      });
    </script>

    <main class="sale-shell">
      <section class="sale-banner">
        <h1>Flash Sale Sneaker</h1>
        <p>Giá sale được đồng bộ tự động với toàn bộ danh mục nam và nữ. Nhanh tay trước khi chương trình kết thúc!</p>
      </section>
      <section class="sale-grid" id="saleGrid"></section>
    </main>

    <div id="shared-footer"></div>
    <script>
      fetch("../compones/footer.html").then((r) => r.text()).then((html) => {
        const host = document.getElementById("shared-footer");
        host.innerHTML = html;
        host.querySelectorAll("script").forEach((oldScript) => {
          const s = document.createElement("script");
          if (oldScript.src) s.src = oldScript.src;
          else s.textContent = oldScript.textContent;
          document.body.appendChild(s);
          oldScript.remove();
        });
      });
    </script>

    <script type="module">
      import { menProducts, womenProducts } from "../js/products.js";

      const allProducts = [
        ...menProducts.map((p) => ({ ...p, source: "men" })),
        ...womenProducts.map((p) => ({ ...p, source: "women" })),
      ];

      function formatCurrency(value) {
        return value.toLocaleString("vi-VN") + "đ";
      }

      function getDiscountPercent(product) {
        if (!product.oldPrice || product.oldPrice <= product.price) return 0;
        return Math.round(((product.oldPrice - product.price) / product.oldPrice) * 100);
      }

      const saleProducts = allProducts
        .filter((item) => item.oldPrice && item.oldPrice > item.price)
        .sort((a, b) => getDiscountPercent(b) - getDiscountPercent(a));

      const grid = document.getElementById("saleGrid");
      grid.innerHTML = saleProducts
        .map((product) => {
          const discount = getDiscountPercent(product);
          const sourceLabel = product.source === "women" ? "Nữ" : "Nam";
          return `
            <article class="sale-card">
              <div class="sale-media">
                <span class="sale-badge">-${discount}%</span>
                <img src="${product.image}" alt="${product.name}" />
              </div>
              <div class="sale-info">
                <h3>${product.name}</h3>
                <div class="sale-meta">${sourceLabel} • ${product.category} • ${product.rating}/5</div>
                <div class="price-wrap">
                  <span class="new-price">${formatCurrency(product.price)}</span>
                  <span class="old-price">${formatCurrency(product.oldPrice)}</span>
                </div>
                <a class="my-btn" href="detail.html?id=${product.id}&source=${product.source}">Xem chi tiết</a>
              </div>
            </article>
          `;
        })
        .join("");
    </script>
  </body>
</html>
